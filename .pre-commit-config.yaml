repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix, --show-fixes ]
    # Run the formatter.
    - id: ruff-format

- repo: https://github.com/crate-ci/typos
  rev: v1.45.0
  hooks:
    - id: typos
      args: ["--force-exclude"]

- repo: local
  hooks:
    - id: sync-skills-shared
      name: Sync shared docs across sentence-transformers skills
      entry: python skills/sync_shared.py
      language: system
      pass_filenames: false
      files: ^skills/.*\.(md|py)$
